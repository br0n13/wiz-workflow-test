name: Wiz North Vulnerability Scan

on:
  workflow_call:
    inputs:
      fail-on-issues:
        description: Fail the workflow when vulnerabilities are detected.
        required: false
        default: false
        type: boolean
    secrets:
      WIZ_CLIENT_ID:
        required: true
      WIZ_CLIENT_SECRET:
        required: true
  workflow_dispatch:
    inputs:
      fail-on-issues:
        description: Fail the workflow when vulnerabilities are detected.
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: write

jobs:
  wiz-scan:
    runs-on: ubuntu-latest
    env:
      WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
      WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed files
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            base_ref="main"
          elif [[ -n "${{ github.base_ref }}" ]]; then
            base_ref="${{ github.base_ref }}"
          else
            base_ref="main"
          fi

          git fetch origin "$base_ref" --depth=1
          git diff --name-only "origin/${base_ref}...${{ github.sha }}" > changed_files.txt

          awk 'NF' changed_files.txt > changed_files_filtered.txt
          mv changed_files_filtered.txt changed_files.txt

          {
            echo "files<<EOF"
            cat changed_files.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Changed files:"
          cat changed_files.txt || true

      - name: Run Wiz CLI composite action
        id: wiz
        uses: ./actions/wiz-cli
        with:
          files: ${{ steps.changes.outputs.files }}
          policy: North vulnerabilities scanning
          output-file: wiz-results.json

      - name: Summarize Wiz results
        id: summarize
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/summarize_results.py \
            --input "${{ steps.wiz.outputs.output-file }}" \
            --summary-file wiz-summary.md \
            --counts-file wiz-counts.json

          issues=$(python3 - <<'PY'
import json
with open('wiz-counts.json', 'r', encoding='utf-8') as fh:
    data = json.load(fh)
print(data.get('total', 0))
PY
)
          echo "issues=$issues" >> "$GITHUB_OUTPUT"

      - name: Post pull request comment
        if: ${{ github.event.pull_request.number != null }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          python3 scripts/post_pr_comment.py --summary-file wiz-summary.md

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wiz-scan-results
          path: |
            wiz-results.json
            wiz-summary.md
            wiz-counts.json
            changed_files.txt

      - name: Enforce fail-on-issues
        if: ${{ inputs.fail-on-issues || github.event.inputs.fail-on-issues == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.summarize.outputs.issues }}" -gt 0 ]]; then
            echo "Vulnerabilities detected and fail-on-issues is enabled."
            exit 1
          fi
