name: Wiz North Vulnerability Scan

on:
  pull_request:
  workflow_dispatch:
  workflow_call:
    secrets:
      WIZ_CLIENT_ID:
        required: true
      WIZ_CLIENT_SECRET:
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  wiz-scan:
    runs-on: ubuntu-latest
    env:
      WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
      WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compute changed files
        id: refs
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.sha }}"
            HEAD_REF="${{ github.event.pull_request.head.sha }}"
            PR_NUMBER="${{ github.event.pull_request.number }}"
          else
            git fetch origin main --depth=1
            BASE_REF="$(git rev-parse origin/main)"
            HEAD_REF="${GITHUB_SHA}"
            PR_NUMBER=""
          fi

          echo "base_ref=${BASE_REF}" >> "${GITHUB_OUTPUT}"
          echo "head_ref=${HEAD_REF}" >> "${GITHUB_OUTPUT}"
          echo "pr_number=${PR_NUMBER}" >> "${GITHUB_OUTPUT}"

          git diff --name-only "${BASE_REF}" "${HEAD_REF}" > changed_files.txt || true

      - name: Build scan scope
        run: |
          python3 scripts/build_scan_scope.py \
            --changed-files changed_files.txt \
            --output scan-scope.json

      - name: Install Wiz CLI
        run: |
          curl -L https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64 -o wiz
          chmod +x wiz
          sudo mv wiz /usr/local/bin/wiz
          wiz --version || true

      - name: Run baseline scan
        run: |
          git checkout "${{ steps.refs.outputs.base_ref }}"

          echo "Running Wiz scan with policy: North vulnerabilities scanning"
          wiz scan . \
            --policy "North vulnerabilities scanning" \
            --client-id "$WIZ_CLIENT_ID" \
            --client-secret "$WIZ_CLIENT_SECRET" \
            > baseline-results.json || true

      - name: Run Wiz Scan
        run: |
          git checkout "${{ steps.refs.outputs.head_ref }}"

          echo "Running Wiz scan with policy: North vulnerabilities scanning"
          wiz scan . \
            --policy "North vulnerabilities scanning" \
            --client-id "$WIZ_CLIENT_ID" \
            --client-secret "$WIZ_CLIENT_SECRET" \
            > pr-results.json || true

      - name: Diff results
        run: |
          python3 scripts/diff_results.py \
            --baseline baseline-results.json \
            --pr pr-results.json \
            --output new-findings.json

      - name: Generate table summary
        run: |
          python3 scripts/summarize_results.py \
            --input new-findings.json \
            --summary-json summary.json \
            --summary-md summary.md

      - name: Post PR comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/post_pr_comment.py \
            --summary-md summary.md \
            --pr-number "${{ steps.refs.outputs.pr_number }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wiz-north-scan-artifacts
          path: |
            changed_files.txt
            scan-scope.json
            baseline-results.json
            pr-results.json
            new-findings.json
            summary.json
            summary.md
          if-no-files-found: warn
