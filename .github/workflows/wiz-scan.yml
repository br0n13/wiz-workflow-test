name: Reusable Wiz Security Scan

on:
  workflow_call:
    secrets:
      WIZ_CLIENT_ID:
        required: true
      WIZ_CLIENT_SECRET:
        required: true
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  wiz-scan:
    name: Wiz CLI scan
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'wiz-main-scan' || format('wiz-scan-{0}', github.run_id) }}
      cancel-in-progress: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install Wiz CLI
        run: |
          curl -Lo wizcli https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64
          chmod +x wizcli
          sudo mv wizcli /usr/local/bin/

      - name: Authenticate Wiz CLI
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${WIZ_CLIENT_ID:-}" ] || [ -z "${WIZ_CLIENT_SECRET:-}" ]; then
            echo "WIZ_CLIENT_ID and WIZ_CLIENT_SECRET must both be set"
            exit 1
          fi

          AUTH_HELP=$(wizcli auth --help 2>&1 || true)

          if printf '%s' "$AUTH_HELP" | grep -q -- '--client-id' && printf '%s' "$AUTH_HELP" | grep -q -- '--client-secret'; then
            wizcli auth --client-id "$WIZ_CLIENT_ID" --client-secret "$WIZ_CLIENT_SECRET"
          elif printf '%s' "$AUTH_HELP" | grep -q -- '--id' && printf '%s' "$AUTH_HELP" | grep -q -- '--secret'; then
            wizcli auth --id "$WIZ_CLIENT_ID" --secret "$WIZ_CLIENT_SECRET"
          elif printf '%s' "$AUTH_HELP" | grep -q -- '--client' && printf '%s' "$AUTH_HELP" | grep -q -- '--secret'; then
            wizcli auth --client "$WIZ_CLIENT_ID" --secret "$WIZ_CLIENT_SECRET"
          else
            wizcli auth
          fi

      - name: Detect changed files for PR scan
        if: ${{ github.event_name == 'pull_request' }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          git fetch origin "$BASE_SHA"
          git diff --name-status "$BASE_SHA" "$HEAD_SHA" > changed_files_raw.txt

          : > changed_files.txt
          while IFS=$'\t' read -r status path1 path2; do
            code="${status%%[0-9]*}"
            case "$code" in
              M|A)
                echo "$path1" >> changed_files.txt
                ;;
              R)
                echo "$path2" >> changed_files.txt
                ;;
              D)
                ;;
            esac
          done < changed_files_raw.txt

          sort -u -o changed_files.txt changed_files.txt

          if [ -s changed_files.txt ]; then
            xargs -I{} dirname "{}" < changed_files.txt | sort -u > changed_dirs.txt
          else
            : > changed_dirs.txt
          fi

          if grep -Eq '^(Dockerfile|package\.json|requirements\.txt|go\.mod|pom\.xml|pyproject\.toml)$' changed_files.txt; then
            echo "." >> changed_dirs.txt
          fi

          sort -u -o changed_dirs.txt changed_dirs.txt

      - name: Run differential Wiz scan for pull requests
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          set -euo pipefail

          if [ ! -s changed_dirs.txt ]; then
            echo "No changed files detected"
            echo '{"findings": []}' > wiz-results.json
            exit 0
          fi

          mkdir -p wiz-partials

          HELP_TEXT=$(wizcli scan dir --help 2>&1 || true)
          SCAN_BASE_ARGS=()
          if printf '%s' "$HELP_TEXT" | grep -q -- '--policy'; then
            SCAN_BASE_ARGS+=(--policy "default vulnerability management")
          fi
          if printf '%s' "$HELP_TEXT" | grep -q -- '--fail-on-issues'; then
            SCAN_BASE_ARGS+=(--fail-on-issues false)
          fi

          i=0
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            i=$((i + 1))
            output="wiz-partials/wiz-results-${i}.json"

            echo "Scanning directory: $dir"
            if printf '%s' "$HELP_TEXT" | grep -q -- '--output-file'; then
              wizcli scan dir "$dir" "${SCAN_BASE_ARGS[@]}" --output-file "$output"
            elif printf '%s' "$HELP_TEXT" | grep -q -- '--output'; then
              wizcli scan dir "$dir" "${SCAN_BASE_ARGS[@]}" --output "$output"
            else
              wizcli scan dir "$dir" "${SCAN_BASE_ARGS[@]}" > "$output"
            fi
          done < changed_dirs.txt

          if [ "$i" -eq 0 ]; then
            echo '{"findings": []}' > wiz-results.json
            exit 0
          fi

          jq -s '.' wiz-partials/wiz-results-*.json > wiz-results.json
      - name: Run full Wiz scan for main branch pushes and workflow calls
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          set -euo pipefail

          HELP_TEXT=$(wizcli scan dir --help 2>&1 || true)
          SCAN_BASE_ARGS=()
          if printf '%s' "$HELP_TEXT" | grep -q -- '--policy'; then
            SCAN_BASE_ARGS+=(--policy "default vulnerability management")
          fi
          if printf '%s' "$HELP_TEXT" | grep -q -- '--fail-on-issues'; then
            SCAN_BASE_ARGS+=(--fail-on-issues false)
          fi

          if printf '%s' "$HELP_TEXT" | grep -q -- '--output-file'; then
            wizcli scan dir . "${SCAN_BASE_ARGS[@]}" --output-file wiz-results.json
          elif printf '%s' "$HELP_TEXT" | grep -q -- '--output'; then
            wizcli scan dir . "${SCAN_BASE_ARGS[@]}" --output wiz-results.json
          else
            wizcli scan dir . "${SCAN_BASE_ARGS[@]}" > wiz-results.json
          fi

      - name: Extract High and Critical findings
        run: |
          python3 scripts/extract_wiz_findings.py \
            --input wiz-results.json \
            --output filtered-findings.json \
            --markdown wiz-pr-comment.md

      - name: Post findings to pull request
        if: ${{ github.event_name == 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 scripts/generate_pr_comment.py \
            --comment-file wiz-pr-comment.md

      - name: Upload Wiz JSON report
        uses: actions/upload-artifact@v4
        with:
          name: wiz-results
          path: wiz-results.json
          if-no-files-found: error
