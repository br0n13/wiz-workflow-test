name: Wiz North Vulnerability Scan

on:
  pull_request:
  workflow_dispatch:
    inputs:
      fail-on-issues:
        description: 'Fail only when NEW findings are introduced'
        required: false
        default: 'false'
        type: boolean
      base-ref:
        description: 'Base reference to compare against for manual runs'
        required: false
        default: 'main'
        type: string
      scan-mode:
        description: 'Scan mode override: auto/files/directories/repo'
        required: false
        default: 'auto'
        type: string
  workflow_call:
    inputs:
      fail-on-issues:
        required: false
        default: false
        type: boolean
      base-ref:
        required: false
        default: main
        type: string
      scan-mode:
        required: false
        default: auto
        type: string
    secrets:
      WIZ_CLIENT_ID:
        required: true
      WIZ_CLIENT_SECRET:
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  wiz-scan:
    runs-on: ubuntu-latest
    env:
      POLICY_NAME: North vulnerabilities scanning
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve refs and inputs
        id: refs
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            PR_NUMBER="${{ github.event.pull_request.number }}"
          else
            BASE_REF="${{ inputs.base-ref || 'main' }}"
            git fetch origin "${BASE_REF}" --depth=1
            BASE_SHA="$(git rev-parse "origin/${BASE_REF}")"
            HEAD_SHA="${GITHUB_SHA}"
            PR_NUMBER=""
          fi

          FAIL_ON_ISSUES="${{ inputs.fail-on-issues || false }}"
          SCAN_MODE="${{ inputs.scan-mode || 'auto' }}"

          echo "base_sha=${BASE_SHA}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "fail_on_issues=${FAIL_ON_ISSUES}" >> "$GITHUB_OUTPUT"
          echo "scan_mode=${SCAN_MODE}" >> "$GITHUB_OUTPUT"

      - name: Build changed file list
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-status "${{ steps.refs.outputs.base_sha }}" "${{ steps.refs.outputs.head_sha }}" > changed_files.txt
          echo "Changed files:"
          cat changed_files.txt || true

      - name: Derive scan scope
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/build_scan_scope.py \
            --changed-files changed_files.txt \
            --output scan-scope.json
          cat scan-scope.json

      - name: Checkout base branch state
        shell: bash
        run: |
          set -euo pipefail
          git checkout --force "${{ steps.refs.outputs.base_sha }}"

      - name: Baseline scan
        uses: ./actions/wiz-cli
        with:
          scan-target: scan-scope.json
          policy-name: ${{ env.POLICY_NAME }}
          output-file: baseline-results.json
          scan-mode: ${{ steps.refs.outputs.scan_mode }}
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}

      - name: Checkout PR head state
        shell: bash
        run: |
          set -euo pipefail
          git checkout --force "${{ steps.refs.outputs.head_sha }}"

      - name: PR scan
        uses: ./actions/wiz-cli
        with:
          scan-target: scan-scope.json
          policy-name: ${{ env.POLICY_NAME }}
          output-file: pr-results.json
          scan-mode: ${{ steps.refs.outputs.scan_mode }}
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}

      - name: Diff baseline vs PR results
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/diff_results.py \
            --baseline baseline-results.json \
            --pr pr-results.json \
            --output new-findings.json

      - name: Build human and machine summaries
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/summarize_results.py \
            --input new-findings.json \
            --summary-json summary.json \
            --summary-md summary.md \
            --policy-name "${POLICY_NAME}"
          cat summary.md

      - name: Create or update pull request comment
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.refs.outputs.pr_number }}
        run: |
          set -euo pipefail
          python3 scripts/post_pr_comment.py \
            --summary-md summary.md

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wiz-scan-artifacts
          path: |
            baseline-results.json
            pr-results.json
            new-findings.json
            summary.json
            summary.md
            changed_files.txt
            scan-scope.json

      - name: Enforce fail-on-issues gate
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.refs.outputs.fail_on_issues }}" != "true" ]; then
            echo "fail-on-issues disabled; not failing workflow on findings."
            exit 0
          fi

          total_new="$(python3 - <<'PY'
import json
with open('summary.json', 'r', encoding='utf-8') as f:
    print(int(json.load(f).get('total_new_findings', 0)))
PY
)"

          if [ "${total_new}" -gt 0 ]; then
            echo "Failing build because fail-on-issues=true and ${total_new} new finding(s) were introduced."
            exit 1
          fi

          echo "No new findings; gate passed."
