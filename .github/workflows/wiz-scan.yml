name: Reusable Wiz Security Scan

on:
  workflow_call:
    secrets:
      WIZ_CLIENT_ID:
        required: true
      WIZ_CLIENT_SECRET:
        required: true
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  wiz-scan:
    name: Wiz CLI scan
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'wiz-main-scan' || format('wiz-pr-scan-{0}', github.run_id) }}
      cancel-in-progress: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Wiz CLI
        run: |
          curl -Lo wizcli https://wizcli.app/wizcli
          chmod +x wizcli
          sudo mv wizcli /usr/local/bin/

      - name: Authenticate Wiz CLI
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: |
          wizcli auth \
            --client-id "$WIZ_CLIENT_ID" \
            --client-secret "$WIZ_CLIENT_SECRET"

      - name: Detect PR changed files
        if: ${{ github.event_name == 'pull_request' }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          git fetch --no-tags origin "$BASE_SHA"
          git diff --name-status "$BASE_SHA" "$HEAD_SHA" > changed_files_raw.txt

          awk -F '\t' '
            $1 ~ /^D/ { next }
            $1 ~ /^R/ { print $3; next }
            $1 ~ /^[AM]/ { print $2; next }
          ' changed_files_raw.txt | sort -u > changed_files.txt

          awk -F/ 'NF > 1 { print }' changed_files.txt \
            | xargs -I{} dirname {} \
            | sort -u > changed_dirs.txt

          if grep -Eq '^(Dockerfile|package\.json|requirements\.txt|go\.mod|pom\.xml|pyproject\.toml)$' changed_files.txt; then
            echo "." >> changed_dirs.txt
          fi

          sort -u -o changed_dirs.txt changed_dirs.txt

      - name: Run Wiz scan (PR differential)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          set -euo pipefail

          if [ ! -s changed_dirs.txt ]; then
            echo "No changed files detected"
            echo "[]" > wiz-results.json
            exit 0
          fi

          mapfile -t dirs < changed_dirs.txt
          wizcli scan dir "${dirs[@]}" \
            --policy "default vulnerability management" \
            --format json \
            --output wiz-results.json \
            --fail-on-issues false

      - name: Run Wiz scan (main full)
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: |
          wizcli scan dir . \
            --policy "default vulnerability management" \
            --format json \
            --output wiz-results.json \
            --fail-on-issues false

      - name: Extract High and Critical findings
        run: |
          python3 scripts/extract_wiz_findings.py \
            --input wiz-results.json \
            --output filtered-findings.json \
            --markdown wiz-pr-comment.md

      - name: Post findings to pull request
        if: ${{ github.event_name == 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 scripts/generate_pr_comment.py \
            --comment-file wiz-pr-comment.md

      - name: Upload Wiz JSON report
        uses: actions/upload-artifact@v4
        with:
          name: wiz-results
          path: wiz-results.json
          if-no-files-found: error
