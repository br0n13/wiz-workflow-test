name: Wiz North Vulnerability Scan

on:
  pull_request:
  workflow_dispatch:
    inputs:
      base-ref:
        description: 'Base reference to compare against for manual runs'
        required: false
        default: 'main'
        type: string
  workflow_call:
    inputs:
      base-ref:
        required: false
        default: 'main'
        type: string
    secrets:
      WIZ_CLIENT_ID:
        required: true
      WIZ_CLIENT_SECRET:
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  wiz-scan:
    runs-on: ubuntu-latest
    env:
      POLICY_NAME: North vulnerabilities scanning
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compute changed files
        id: refs
        shell: bash
        run: |
          set +e
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            PR_NUMBER="${{ github.event.pull_request.number }}"
          else
            BASE_REF="${{ inputs.base-ref || 'main' }}"
            git fetch origin "${BASE_REF}" --depth=1 || true
            BASE_SHA="$(git rev-parse "origin/${BASE_REF}" 2>/dev/null || git rev-parse HEAD)"
            HEAD_SHA="${GITHUB_SHA}"
            PR_NUMBER=""
          fi

          git diff --name-status "${BASE_SHA}" "${HEAD_SHA}" > changed_files.txt || true
          cat changed_files.txt || true

          echo "base_sha=${BASE_SHA}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build scan scope
        shell: bash
        run: |
          python3 scripts/build_scan_scope.py --changed-files changed_files.txt --output scan-scope.json
          cat scan-scope.json

      - name: Install Wiz CLI
        shell: bash
        run: |
          set +e
          if command -v wiz >/dev/null 2>&1; then
            wiz --version || true
            exit 0
          fi
          curl -fsSL "https://downloads.wiz.io/wizcli/latest/wizcli-linux-amd64.tar.gz" -o wizcli.tar.gz || true
          tar -xzf wizcli.tar.gz || true
          if [ -f wiz ]; then
            chmod +x wiz || true
            sudo mv wiz /usr/local/bin/wiz || true
          fi
          wiz --version || echo "Wiz CLI install failed; scans will remain informational."
          exit 0

      - name: Run baseline scan
        shell: bash
        run: |
          set +e
          git checkout --force "${{ steps.refs.outputs.base_sha }}" || true
          exit 0

      - name: Baseline scan execution
        uses: ./actions/wiz-cli
        with:
          scan-target: scan-scope.json
          output-file: baseline-results.json
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}

      - name: Run PR scan
        shell: bash
        run: |
          set +e
          git checkout --force "${{ steps.refs.outputs.head_sha }}" || true
          exit 0

      - name: PR scan execution
        uses: ./actions/wiz-cli
        with:
          scan-target: scan-scope.json
          output-file: pr-results.json
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}

      - name: Save JSON results (diff)
        shell: bash
        run: |
          python3 scripts/diff_results.py --baseline baseline-results.json --pr pr-results.json --output new-findings.json

      - name: Summarize results
        shell: bash
        run: |
          python3 scripts/summarize_results.py --input new-findings.json --summary-json summary.json --summary-md summary.md
          cat summary.md

      - name: Post PR comment
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.refs.outputs.pr_number }}
        run: |
          python3 scripts/post_pr_comment.py --summary-md summary.md

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wiz-scan-artifacts
          path: |
            baseline-results.json
            pr-results.json
            new-findings.json
            summary.json
            summary.md
            changed_files.txt
            scan-scope.json
