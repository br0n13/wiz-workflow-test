name: Centralized Wiz CLI Scan

on:
  repository_dispatch:
    types: [wiz-cli-scan]
  workflow_dispatch:
    inputs:
      target_owner:
        description: GitHub organization/user that owns the target repository
        required: true
        type: string
      target_repo:
        description: Target repository name to scan
        required: true
        type: string
      target_ref:
        description: Branch, tag, or SHA to scan
        required: false
        type: string
        default: main
      pull_request_number:
        description: Pull request number in target repository (optional)
        required: false
        type: string
      installation_id:
        description: GitHub App installation ID for the target repository
        required: true
        type: string

permissions:
  contents: read

jobs:
  wiz-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve scan parameters
        id: params
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "target_owner=${{ github.event.client_payload.target_owner }}" >> "$GITHUB_OUTPUT"
            echo "target_repo=${{ github.event.client_payload.target_repo }}" >> "$GITHUB_OUTPUT"
            echo "target_ref=${{ github.event.client_payload.target_ref }}" >> "$GITHUB_OUTPUT"
            echo "pull_request_number=${{ github.event.client_payload.pull_request_number }}" >> "$GITHUB_OUTPUT"
            echo "installation_id=${{ github.event.client_payload.installation_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "target_owner=${{ github.event.inputs.target_owner }}" >> "$GITHUB_OUTPUT"
            echo "target_repo=${{ github.event.inputs.target_repo }}" >> "$GITHUB_OUTPUT"
            echo "target_ref=${{ github.event.inputs.target_ref }}" >> "$GITHUB_OUTPUT"
            echo "pull_request_number=${{ github.event.inputs.pull_request_number }}" >> "$GITHUB_OUTPUT"
            echo "installation_id=${{ github.event.inputs.installation_id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate GitHub App token for target repo
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ steps.params.outputs.target_owner }}
          repositories: ${{ steps.params.outputs.target_repo }}

      - name: Checkout scanning repository
        uses: actions/checkout@v4

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.params.outputs.target_owner }}/${{ steps.params.outputs.target_repo }}
          ref: ${{ steps.params.outputs.target_ref }}
          token: ${{ steps.app-token.outputs.token }}
          path: target-repo

      - name: Install Wiz CLI
        run: |
          curl -sSL "https://downloads.wiz.io/wizcli/latest/wizcli-linux-amd64" -o wizcli
          chmod +x wizcli
          sudo mv wizcli /usr/local/bin/wizcli
          wizcli --version

      - name: Authenticate Wiz CLI
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: |
          wizcli auth --client-id "$WIZ_CLIENT_ID" --client-secret "$WIZ_CLIENT_SECRET"

      - name: Run Wiz CLI scan (JSON output, non-blocking)
        run: |
          mkdir -p output
          wizcli scan \
            --path ./target-repo \
            --policy default \
            --output output/wiz-results.json \
            --format json \
            --fail-on-issues false

      - name: Parse Wiz results with jq
        run: |
          chmod +x scripts/parse_wiz_results.sh
          scripts/parse_wiz_results.sh output/wiz-results.json output/wiz-summary.json output/wiz-summary.md

      - name: Post results to GitHub (PR + Check Run)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_OWNER: ${{ steps.params.outputs.target_owner }}
          TARGET_REPO: ${{ steps.params.outputs.target_repo }}
          TARGET_REF: ${{ steps.params.outputs.target_ref }}
          PULL_REQUEST_NUMBER: ${{ steps.params.outputs.pull_request_number }}
        run: |
          chmod +x scripts/post_results_to_github.sh
          scripts/post_results_to_github.sh output/wiz-summary.json output/wiz-summary.md

      - name: Post results to Slack
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TARGET_OWNER: ${{ steps.params.outputs.target_owner }}
          TARGET_REPO: ${{ steps.params.outputs.target_repo }}
          TARGET_REF: ${{ steps.params.outputs.target_ref }}
        run: |
          chmod +x scripts/post_results_to_slack.sh
          scripts/post_results_to_slack.sh output/wiz-summary.md
