name: Centralized Wiz CLI Scan

on:
  workflow_dispatch:
    inputs:
      target_owner:
        description: GitHub organization/user that owns the target repository
        required: true
        type: string
      target_repo:
        description: Target repository name to scan
        required: true
        type: string
      target_ref:
        description: Branch, tag, or SHA to scan
        required: false
        type: string
        default: main
      pull_request_number:
        description: Pull request number in target repository (optional)
        required: false
        type: string
      installation_id:
        description: GitHub App installation ID for the target repository
        required: true
        type: string

permissions:
  contents: read

jobs:
  wiz-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token for target repo
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.event.inputs.target_owner }}
          repositories: ${{ github.event.inputs.target_repo }}

      - name: Checkout scanning repository
        uses: actions/checkout@v4

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.target_owner }}/${{ github.event.inputs.target_repo }}
          ref: ${{ github.event.inputs.target_ref }}
          token: ${{ steps.app-token.outputs.token }}
          path: target-repo

      - name: Install Wiz CLI
        run: |
          curl -sSL "https://downloads.wiz.io/wizcli/latest/wizcli-linux-amd64" -o wizcli
          chmod +x wizcli
          sudo mv wizcli /usr/local/bin/wizcli
          wizcli --version

      - name: Authenticate Wiz CLI
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: |
          wizcli auth \
            --client-id "$WIZ_CLIENT_ID" \
            --client-secret "$WIZ_CLIENT_SECRET"

      - name: Run Wiz CLI scan (JSON output, non-blocking)
        run: |
          mkdir -p output
          wizcli scan \
            --path ./target-repo \
            --policy default \
            --output output/wiz-results.json \
            --format json \
            --fail-on-issues false

      - name: Parse Wiz results with jq
        run: |
          chmod +x scripts/parse_wiz_results.sh
          scripts/parse_wiz_results.sh output/wiz-results.json output/wiz-summary.json output/wiz-summary.md

      - name: Post PR comment to target repository
        if: ${{ github.event.inputs.pull_request_number != '' }}
        uses: actions/github-script@v7
        env:
          TARGET_OWNER: ${{ github.event.inputs.target_owner }}
          TARGET_REPO: ${{ github.event.inputs.target_repo }}
          PULL_REQUEST_NUMBER: ${{ github.event.inputs.pull_request_number }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('output/wiz-summary.md', 'utf8');

            await github.rest.issues.createComment({
              owner: process.env.TARGET_OWNER,
              repo: process.env.TARGET_REPO,
              issue_number: Number(process.env.PULL_REQUEST_NUMBER),
              body,
            });

      - name: Publish GitHub Check Run in target repository
        uses: actions/github-script@v7
        env:
          TARGET_OWNER: ${{ github.event.inputs.target_owner }}
          TARGET_REPO: ${{ github.event.inputs.target_repo }}
          TARGET_REF: ${{ github.event.inputs.target_ref }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('output/wiz-summary.json', 'utf8'));
            const text = fs.readFileSync('output/wiz-summary.md', 'utf8');

            const sevLine = `Critical: ${summary.critical}, High: ${summary.high}, Medium: ${summary.medium}, Low: ${summary.low}, Info: ${summary.info}`;

            await github.rest.checks.create({
              owner: process.env.TARGET_OWNER,
              repo: process.env.TARGET_REPO,
              name: 'Wiz CLI Scan',
              head_sha: process.env.TARGET_REF,
              status: 'completed',
              conclusion: 'success',
              output: {
                title: 'Wiz CLI scan completed (non-blocking)',
                summary: sevLine,
                text,
              },
            });
