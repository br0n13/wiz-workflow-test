name: "Wiz CLI Scan"
description: "Run Wiz CLI vulnerability scanning"

inputs:
  scan-target:
    description: "Path to scan"
    required: false
    default: "."

  output-file:
    description: "Output JSON file"
    required: false
    default: "wiz-results.json"

runs:
  using: "composite"
  steps:
    - name: Install Wiz CLI
      shell: bash
      run: |
        curl -L https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64 -o wiz
        chmod +x wiz
        sudo mv wiz /usr/local/bin/wiz

    - name: Run Wiz Scan
      shell: bash
      run: |
        echo "Running Wiz scan with policy: North vulnerabilities scanning"

        wiz scan "${{ inputs.scan-target }}" 
          --policy "North vulnerabilities scanning" 
          --client-id "$WIZ_CLIENT_ID" 
          --client-secret "$WIZ_CLIENT_SECRET" 
          > "${{ inputs.output-file }}" || true

    - name: Print Results
      shell: bash
      run: |
        echo "Scan output:"
        cat "${{ inputs.output-file }}" || echo "No results file found"
