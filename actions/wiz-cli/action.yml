name: 'Wiz CLI Scan'
description: 'Installs Wiz CLI and runs a policy scan with explicit client credentials.'
inputs:
  scan-target:
    description: 'Path to scan-scope.json generated by scripts/build_scan_scope.py'
    required: true
  policy-name:
    description: 'Wiz policy name to enforce'
    required: true
    default: 'North vulnerabilities scanning'
  output-file:
    description: 'Output JSON path for Wiz scan results'
    required: true
  scan-mode:
    description: 'Scan mode hint (auto/files/directories/repo)'
    required: false
    default: 'auto'
runs:
  using: 'composite'
  steps:
    - name: Install Wiz CLI
      shell: bash
      run: |
        set -euo pipefail

        if command -v wiz >/dev/null 2>&1; then
          echo "Wiz CLI already installed: $(wiz --version || true)"
          exit 0
        fi

        WIZ_CLI_VERSION="${WIZ_CLI_VERSION:-latest}"
        WIZ_CLI_ARCHIVE_URL="${WIZ_CLI_ARCHIVE_URL:-https://downloads.wiz.io/wizcli/${WIZ_CLI_VERSION}/wizcli-linux-amd64.tar.gz}"
        TMP_DIR="$(mktemp -d)"

        echo "Installing Wiz CLI from ${WIZ_CLI_ARCHIVE_URL}"
        if ! curl -fsSL "${WIZ_CLI_ARCHIVE_URL}" -o "${TMP_DIR}/wizcli.tar.gz"; then
          echo "Failed to download Wiz CLI archive from ${WIZ_CLI_ARCHIVE_URL}" >&2
          exit 1
        fi

        tar -xzf "${TMP_DIR}/wizcli.tar.gz" -C "${TMP_DIR}"
        WIZ_BIN="$(find "${TMP_DIR}" -type f -name wiz | head -n1)"

        if [ -z "${WIZ_BIN}" ]; then
          echo "Downloaded archive did not contain a wiz binary." >&2
          exit 1
        fi

        chmod +x "${WIZ_BIN}"
        sudo mv "${WIZ_BIN}" /usr/local/bin/wiz
        wiz --version

    - name: Run Wiz policy scan
      shell: bash
      env:
        INPUT_SCAN_TARGET: ${{ inputs.scan-target }}
        INPUT_POLICY_NAME: ${{ inputs.policy-name }}
        INPUT_OUTPUT_FILE: ${{ inputs.output-file }}
        INPUT_SCAN_MODE: ${{ inputs.scan-mode }}
        WIZ_CLIENT_ID: ${{ env.WIZ_CLIENT_ID }}
        WIZ_CLIENT_SECRET: ${{ env.WIZ_CLIENT_SECRET }}
      run: |
        set -euo pipefail

        if [ -z "${WIZ_CLIENT_ID:-}" ] || [ -z "${WIZ_CLIENT_SECRET:-}" ]; then
          echo "WIZ_CLIENT_ID and WIZ_CLIENT_SECRET must be provided." >&2
          exit 1
        fi

        if [ ! -f "${INPUT_SCAN_TARGET}" ]; then
          echo "scan-target file not found: ${INPUT_SCAN_TARGET}" >&2
          exit 1
        fi

        mkdir -p "$(dirname "${INPUT_OUTPUT_FILE}")"

        # Keep scan syntax configurable in one place.
        # Override WIZ_SCAN_SUBCOMMAND if your Wiz CLI syntax differs.
        WIZ_SCAN_SUBCOMMAND="${WIZ_SCAN_SUBCOMMAND:-scan iac}"

        mapfile -t TARGETS < <(python3 - <<'PY'
import json
import os

path = os.environ["INPUT_SCAN_TARGET"]
scan_mode_hint = os.environ.get("INPUT_SCAN_MODE", "auto")

with open(path, "r", encoding="utf-8") as f:
    data = json.load(f)

mode = data.get("mode", "repo")
targets = data.get("targets", ["."])
if scan_mode_hint != "auto":
    mode = scan_mode_hint

for t in targets:
    print(t)
PY
)

        if [ "${#TARGETS[@]}" -eq 0 ]; then
          TARGETS=(".")
        fi

        CMD=(wiz)
        for token in ${WIZ_SCAN_SUBCOMMAND}; do
          CMD+=("$token")
        done

        for target in "${TARGETS[@]}"; do
          CMD+=(--path "$target")
        done

        CMD+=(
          --policy "${INPUT_POLICY_NAME}"
          --output json
          --output-file "${INPUT_OUTPUT_FILE}"
          --client-id "${WIZ_CLIENT_ID}"
          --client-secret "${WIZ_CLIENT_SECRET}"
        )

        echo "Executing Wiz CLI scan for ${#TARGETS[@]} target(s)."
        if ! "${CMD[@]}"; then
          echo "Wiz CLI scan failed. Verify policy name, scope, and command syntax." >&2
          exit 1
        fi

        if [ ! -s "${INPUT_OUTPUT_FILE}" ]; then
          echo "Wiz CLI did not produce output file: ${INPUT_OUTPUT_FILE}" >&2
          exit 1
        fi
