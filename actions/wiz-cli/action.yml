name: 'Wiz CLI Scan'
description: 'Installs Wiz CLI and runs a non-blocking vulnerability scan with explicit credentials.'
inputs:
  scan-target:
    description: 'Path to scan-scope.json generated by scripts/build_scan_scope.py'
    required: true
  output-file:
    description: 'Output JSON path for Wiz scan results'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Install Wiz CLI
      shell: bash
      run: |
        set +e

        if command -v wiz >/dev/null 2>&1; then
          echo "Wiz CLI already installed: $(wiz --version || true)"
          exit 0
        fi

        WIZ_CLI_VERSION="${WIZ_CLI_VERSION:-latest}"
        WIZ_CLI_ARCHIVE_URL="${WIZ_CLI_ARCHIVE_URL:-https://downloads.wiz.io/wizcli/${WIZ_CLI_VERSION}/wizcli-linux-amd64.tar.gz}"
        TMP_DIR="$(mktemp -d)"

        echo "Installing Wiz CLI from ${WIZ_CLI_ARCHIVE_URL}"
        curl -fsSL "${WIZ_CLI_ARCHIVE_URL}" -o "${TMP_DIR}/wizcli.tar.gz" || true
        tar -xzf "${TMP_DIR}/wizcli.tar.gz" -C "${TMP_DIR}" || true
        WIZ_BIN="$(find "${TMP_DIR}" -type f -name wiz | head -n1)"

        if [ -n "${WIZ_BIN}" ]; then
          chmod +x "${WIZ_BIN}" || true
          sudo mv "${WIZ_BIN}" /usr/local/bin/wiz || true
        fi

        wiz --version || echo "Wiz CLI is unavailable; scan step will emit empty output."
        exit 0

    - name: Run Wiz policy scan (informational)
      shell: bash
      env:
        INPUT_SCAN_TARGET: ${{ inputs.scan-target }}
        INPUT_OUTPUT_FILE: ${{ inputs.output-file }}
        WIZ_CLIENT_ID: ${{ env.WIZ_CLIENT_ID }}
        WIZ_CLIENT_SECRET: ${{ env.WIZ_CLIENT_SECRET }}
      run: |
        set +e

        mkdir -p "$(dirname "${INPUT_OUTPUT_FILE}")"

        if [ ! -f "${INPUT_SCAN_TARGET}" ]; then
          echo '{"findings":[],"note":"scan-target missing"}' > "${INPUT_OUTPUT_FILE}"
          exit 0
        fi

        mapfile -t TARGETS < <(python3 - <<'PY'
import json
import os

with open(os.environ["INPUT_SCAN_TARGET"], "r", encoding="utf-8") as f:
    payload = json.load(f)

for target in payload.get("targets", ["."]):
    print(str(target))
PY
)

        if [ "${#TARGETS[@]}" -eq 0 ]; then
          TARGETS=(".")
        fi

        POLICY_NAME="North vulnerabilities scanning"
        echo "Running Wiz policy scan: ${POLICY_NAME}"

        if [ -z "${WIZ_CLIENT_ID:-}" ] || [ -z "${WIZ_CLIENT_SECRET:-}" ] || ! command -v wiz >/dev/null 2>&1; then
          echo '{"findings":[],"note":"wiz cli or credentials unavailable","policy":"North vulnerabilities scanning"}' > "${INPUT_OUTPUT_FILE}"
          exit 0
        fi

        CMD=(wiz scan)
        for target in "${TARGETS[@]}"; do
          CMD+=(--path "$target")
        done
        CMD+=(
          --policy "North vulnerabilities scanning"
          --output json
          --output-file "${INPUT_OUTPUT_FILE}"
          --client-id "${WIZ_CLIENT_ID}"
          --client-secret "${WIZ_CLIENT_SECRET}"
        )

        "${CMD[@]}" || true

        if [ ! -s "${INPUT_OUTPUT_FILE}" ]; then
          echo '{"findings":[],"note":"scan completed without JSON output","policy":"North vulnerabilities scanning"}' > "${INPUT_OUTPUT_FILE}"
        fi

        exit 0
